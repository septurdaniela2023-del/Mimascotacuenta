<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetControl - Gestión de Pacientes</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .search-input { border-radius: 30px; padding-left: 2.5rem; }
        .search-icon { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: #6c757d; }
        .badge-species { font-size: 0.8rem; padding: 0.4em 0.8em; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            
            <!-- Encabezado -->
            <div class="text-center mb-5">
                <h1 class="fw-bold text-primary"><i class="bi bi-shield-plus"></i> VetControl</h1>
                <p class="text-muted">Expediente Clínico Digital</p>
            </div>
            

            <!-- 1.Buscador -->
            <div class="card mb-4">
                <div class="card-body p-4">
                    <div class="position-relative">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" id="searchInput" class="form-control form-control-lg search-input" 
                               placeholder="Buscar por nombre, dueño o especie...">
                    </div>
                </div>
            </div>

            <!-- Tabla de Pacientes -->
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="patientsTable">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Paciente</th>
                                <th>Dueño</th>
                                <th>Especie</th>
                                <th class="text-end pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Los datos se cargan aquí con JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Mensaje Sin Resultados -->
            <div id="noResults" class="text-center mt-5 d-none">
                <i class="bi bi-search-heart fs-1 text-muted"></i>
                <p class="mt-2 text-muted">No encontramos ningún paciente con esos datos.</p>
            </div>

        </div>
    </div>
</div>

<!-- MODAL DE FICHA MÉDICA (Acordeón + Alerta) -->
<div class="modal fade" id="patientModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Nombre de Mascota</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                
                <!-- ALERTA DE PRÓXIMA CITA (Color Amarillo/Warning) -->
                <div id="nextAppointmentAlert" class="alert alert-warning border-0 shadow-sm d-flex align-items-center mb-4" role="alert">
                    <i class="bi bi-calendar-event-fill me-3 fs-4"></i>
                    <div>
                        <strong>Próxima Cita:</strong> <span id="appointmentDate">15 de Junio - Vacuna Rabia</span>
                    </div>
                </div>

                <h6 class="fw-bold mb-3"><i class="bi bi-clock-history"></i> Historial Médico</h6>
                
                <!-- ACORDEÓN DE HISTORIAL -->
                <div class="accordion accordion-flush border rounded" id="medicalHistoryAccordion">
                    <!-- Las entradas del historial se cargan aquí -->
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Lógica de Datos y Buscador -->
<script>
    // 1. BASE DE DATOS SIMULADA
    const patients = [
        {
            id: 1,
            name: "Firulais",
            owner: "Juan Pérez",
            species: "Perro",
            breed: "Golden Retriever",
            nextAppt: "12/06/2026 - Refuerzo Parvovirus",
            history: [
                { title: "Vacuna Antirrábica", date: "10/01/2026", details: "Aplicada dosis anual. Sin reacciones adversas." },
                { title: "Consulta General", date: "15/03/2026", details: "Control de peso y limpieza de oídos. Todo normal." }
            ]
        },
        {
            id: 2,
            name: "Michi",
            owner: "María García",
            species: "Gato",
            breed: "Siamés",
            nextAppt: "20/07/2026 - Desparasitación interna",
            history: [
                { title: "Desparasitación", date: "05/05/2026", details: "Se aplicó pipeta externa y pastilla interna." }
            ]
        }
    ];

    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');
    const patientModal = new bootstrap.Modal(document.getElementById('patientModal'));

    // 2. FUNCIÓN PARA RENDERIZAR TABLA
    function displayPatients(filter = "") {
        const filtered = patients.filter(p => 
            p.name.toLowerCase().includes(filter.toLowerCase()) || 
            p.owner.toLowerCase().includes(filter.toLowerCase()) ||
            p.species.toLowerCase().includes(filter.toLowerCase())
        );

        tableBody.innerHTML = "";
        
        if (filtered.length === 0) {
            noResults.classList.remove('d-none');
        } else {
            noResults.classList.add('d-none');
            filtered.forEach(p => {
                tableBody.innerHTML += `
                    <tr>
                        <td class="ps-4 fw-bold text-dark">${p.name} <small class="text-muted d-block">${p.breed}</small></td>
                        <td>${p.owner}</td>
                        <td><span class="badge bg-info-subtle text-info-emphasis border border-info-subtle rounded-pill">${p.species}</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-primary rounded-pill px-3" onclick="showDetails(${p.id})">
                                <i class="bi bi-eye"></i> Ver Ficha
                            </button>
                        </td>
                    </tr>
                `;
            });
        }
    }

    // 3. FUNCIÓN PARA MOSTRAR EL ACORDEÓN Y LA ALERTA
    window.showDetails = function(id) {
        const p = patients.find(patient => patient.id === id);
        document.getElementById('modalTitle').innerText = `Ficha Médica: ${p.name}`;
        
        // Configurar Alerta Amarilla (Próxima Cita)
        document.getElementById('appointmentDate').innerText = p.nextAppt;

        // Configurar Acordeón
        const accordion = document.getElementById('medicalHistoryAccordion');
        accordion.innerHTML = p.history.map((item, index) => `
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed fw-semibold" type="button" data-bs-toggle="collapse" data-bs-target="#flush-${index}">
                        ${item.title} <span class="ms-auto text-muted small me-3">${item.date}</span>
                    </button>
                </h2>
                <div id="flush-${index}" class="accordion-collapse collapse" data-bs-parent="#medicalHistoryAccordion">
                    <div class="accordion-body text-muted">${item.details}</div>
                </div>
            </div>
        `).join('');

        patientModal.show();
    }

    // Event Listener Buscador
    searchInput.addEventListener('input', (e) => displayPatients(e.target.value));

    // Carga inicial
    displayPatients();
</script>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
